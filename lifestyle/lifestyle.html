<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Reboot — Lifestyle</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', 'Times New Roman', serif;
      background: #ffffff;
      color: #0f172a;
      overflow-x: hidden;
    }

    /* ================= HEADER ================= */
    header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      z-index: 1002;
    }

    h1 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      margin: 0;
      text-align: center;
      letter-spacing: 0.02em;
    }

    /* ================= MENU ICON ================= */
    .menu-icon {
      position: fixed;
      left: 20px;
      top: 25px;
      cursor: pointer;
      z-index: 1003;
      width: 28px;
      height: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu-icon div {
      height: 3px;
      background-color: #0f172a;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .menu-icon.open div:nth-child(1) {
      transform: rotate(45deg) translateY(9px);
    }

    .menu-icon.open div:nth-child(2) {
      opacity: 0;
    }

    .menu-icon.open div:nth-child(3) {
      transform: rotate(-45deg) translateY(-9px);
    }

    /* ================= NAV ================= */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100%;
      background: #fff;
      border-right: 1px solid #ddd;
      padding-top: 80px;
      transform: translateX(-100%);
      transition: transform 0.4s ease;
      z-index: 1001;
    }

    nav.open {
      transform: translateX(0);
    }

    .menu-item {
      margin: 20px 0;
    }

    .parent-item {
      font-family: 'Times New Roman', serif;
      font-weight: 400;
      font-size: 22px;
      cursor: pointer;
      padding-left: 30px;
      display: block;
    }

    .submenu {
      display: flex;
      flex-direction: column;
      margin-left: 40px;
      max-height: 0;
      overflow: hidden;
      transition: 0.3s ease;
      opacity: 0;
    }

    .menu-item.open .submenu {
      max-height: 200px;
      opacity: 1;
    }

    .submenu a {
      font-family: 'Times New Roman', serif;
      font-weight: 300;
      font-size: 21px;
      color: #000;
      text-decoration: none;
      margin: 5px 0;
      padding-left: 10px;
    }

    .submenu a:hover {
      text-decoration: underline;
    }

    .single-link {
      display: block;
      padding-left: 30px;
      font-family: 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 400;
      text-decoration: none;
      color: #000;
    }

    .single-link:hover {
      text-decoration: underline;
    }

    /* ================= SECTION HEADING ================= */
    .section-heading {
      padding: 40px 60px 10px;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      font-family: 'Playfair Display', serif;
    }

    /* ================= LIFESTYLE POSTS GRID ================= */
    .lifestyle-posts {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      justify-content: flex-start;
      padding: 30px 60px 40px;
      gap: 40px;
    }

    .lifestyle-posts .lifestyle-hero {
      flex: 0 1 45%;
      display: flex;
      flex-direction: column;
      background: transparent;
      overflow: hidden;
    }

    .lifestyle-posts .lifestyle-text {
      padding: 16px 0 0;
    }

    /* Hide the category label to match screenshot */
    .category {
      display: none;
    }

    .lifestyle-posts .lifestyle-text h2 {
      font-size: clamp(18px, 2.2vw, 24px);
      font-weight: 900;
      margin: 0;
      line-height: 1.3;
    }

    .lifestyle-posts .lifestyle-text h2 a {
      color: #0f172a;
      text-decoration: none;
    }

    .lifestyle-posts .lifestyle-text h2 a:hover {
      text-decoration: underline;
    }

    .lifestyle-posts .lifestyle-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 900px) {
      .section-heading {
        padding: 30px 20px 10px;
      }

      .lifestyle-posts {
        flex-direction: column;
        padding: 20px;
      }

      .lifestyle-posts .lifestyle-hero {
        flex: 1 1 100%;
      }
    }

    footer {
      margin-top: 60px;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: #777;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

<header>
  <div class="menu-icon" id="menuToggle">
    <div></div><div></div><div></div>
  </div>
  <h1>The Reboot</h1>
</header>

<nav id="navMenu">
  <div class="menu-item">
    <span class="parent-item">SciFi</span>
    <div class="submenu">
      <a href="../dune.html">DUNE</a>
      <a href="../terminator.html">Terminator</a>
    </div>
  </div>

  <div class="menu-item">
    <span class="parent-item">James Bond Series</span>
    <div class="submenu">
      <a href="../jamesbondseries.html">Casino Royale</a>
    </div>
  </div>

  <div class="menu-item">
    <span class="parent-item">Crime</span>
    <div class="submenu">
      <a href="../thedeparted.html">The Departed</a>
    </div>
  </div>

  <div class="menu-item">
    <a href="lifestyle.html" class="single-link">Lifestyle</a>
  </div>

  <div class="menu-item">
    <a href="../about.html" class="single-link">About</a>
  </div>

  <div class="menu-item">
    <a href="../index.html" class="single-link">Home</a>
  </div>
</nav>

<!-- ================= SECTION HEADING ================= -->
<h2 class="section-heading">Lifestyle</h2>

<!-- ================= LIFESTYLE POSTS GRID ================= -->
<section class="lifestyle-posts">
  <article class="lifestyle-hero">
    <div class="lifestyle-image">
      <img src="../images/Butterkist.jpg.png" alt="Butterkist Crunchy Toffee Popcorn">
    </div>
    <div class="lifestyle-text">
      <div class="category">Lifestyle</div>
      <h2><a href="../Butterkist.html">Butterkist: 100 years at the heart of the Movie theatres</a></h2>
    </div>
  </article>

  <article class="lifestyle-hero">
    <div class="lifestyle-image">
      <img src="../images/whenmarketsmisbehavearemycinematicketsoverpriced.png" alt="Mad Money Cinema Tickets">
    </div>
    <div class="lifestyle-text">
      <div class="category">Lifestyle</div>
      <h2><a href="../whenmarketsmisbehave.html">When Markets Misbehave: Are my cinema tickets overpriced?</a></h2>
    </div>
  </article>
</section>

<footer>
  © 2026 The Reboot — All rights reserved.
</footer>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  const parentItems = document.querySelectorAll('.parent-item');

  menuToggle.addEventListener('click', () => {
    menuToggle.classList.toggle('open');
    navMenu.classList.toggle('open');
  });

  parentItems.forEach(item => {
    item.addEventListener('click', () => {
      item.parentElement.classList.toggle('open');
    });
  });
</script>

</body>
</html>
